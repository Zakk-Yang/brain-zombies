<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain-zombies</title>
<style>
:root {
  --bg: #08101a;
  --bg-soft: #101b29;
  --bg-elevated: #152133;
  --surface: rgba(16, 27, 41, 0.92);
  --surface-2: rgba(21, 33, 51, 0.94);
  --line: #223246;
  --line-strong: #2f4761;
  --text: #d7e1ec;
  --muted: #8fa1b5;
  --accent: #5eead4;
  --accent-2: #60a5fa;
  --warning: #fbbf24;
  --danger: #fb7185;
  --success: #4ade80;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 30%),
    radial-gradient(circle at top right, rgba(94, 234, 212, 0.10), transparent 26%),
    linear-gradient(180deg, #09111b 0%, #06101a 100%);
  min-height: 100vh;
}

button, input, textarea, select {
  font: inherit;
}

button {
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
}

button:hover { transform: translateY(-1px); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

header {
  padding: 1.2rem 1.5rem 0.9rem;
  border-bottom: 1px solid rgba(47, 71, 97, 0.6);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  position: sticky;
  top: 0;
  backdrop-filter: blur(14px);
  background: rgba(8, 16, 26, 0.84);
  z-index: 20;
}

header h1 {
  font-size: 1.2rem;
  margin: 0;
  color: #fff;
}

header h1 span {
  opacity: 0.6;
  font-weight: 400;
  font-size: 0.86rem;
}

.header-actions {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.btn-secondary {
  background: rgba(47, 71, 97, 0.4);
  color: var(--text);
  padding: 0.55rem 0.9rem;
}

.btn-primary {
  background: linear-gradient(135deg, rgba(94, 234, 212, 0.95), rgba(96, 165, 250, 0.95));
  color: #061019;
  padding: 0.7rem 1rem;
  font-weight: 700;
}

.btn-danger {
  background: rgba(190, 24, 93, 0.86);
  color: #fff;
  padding: 0.55rem 0.9rem;
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid rgba(47, 71, 97, 0.7);
  padding: 0.55rem 0.9rem;
}

main {
  max-width: 1320px;
  margin: 0 auto;
  padding: 1.25rem;
}

.notice {
  margin-bottom: 1rem;
  padding: 0.95rem 1rem;
  border-radius: 16px;
  border: 1px solid rgba(47, 71, 97, 0.7);
  background: rgba(16, 27, 41, 0.85);
  display: none;
}

.notice.visible { display: block; }
.notice.info { border-color: rgba(96, 165, 250, 0.35); }
.notice.success { border-color: rgba(74, 222, 128, 0.45); }
.notice.error { border-color: rgba(251, 113, 133, 0.5); }
.notice.warning { border-color: rgba(251, 191, 36, 0.45); }

.mode-banner {
  margin-bottom: 1rem;
  padding: 1rem 1.1rem;
  border-radius: 18px;
  border: 1px solid rgba(96, 165, 250, 0.22);
  background: linear-gradient(135deg, rgba(16, 27, 41, 0.96), rgba(21, 33, 51, 0.92));
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
}

.mode-banner strong {
  color: #fff;
}

.mode-banner code {
  font-family: "IBM Plex Mono", monospace;
  background: rgba(8, 16, 26, 0.8);
  border-radius: 8px;
  padding: 0.15rem 0.35rem;
}

.section-card {
  background: linear-gradient(180deg, rgba(16, 27, 41, 0.96), rgba(10, 18, 29, 0.96));
  border: 1px solid rgba(47, 71, 97, 0.62);
  border-radius: 22px;
  padding: 1.1rem;
  box-shadow: 0 16px 40px rgba(3, 10, 18, 0.26);
}

.wizard-shell {
  display: grid;
  grid-template-columns: 270px minmax(0, 1fr);
  gap: 1rem;
  align-items: start;
}

.wizard-nav {
  position: sticky;
  top: 5.9rem;
}

.wizard-title {
  margin-bottom: 0.95rem;
}

.wizard-title h2 {
  margin: 0 0 0.35rem;
  font-size: 1.55rem;
}

.wizard-title p {
  margin: 0;
  color: var(--muted);
  line-height: 1.55;
}

.step-list {
  display: grid;
  gap: 0.75rem;
}

.step-item {
  border: 1px solid rgba(47, 71, 97, 0.62);
  border-radius: 18px;
  padding: 0.8rem 0.9rem;
  background: rgba(11, 19, 30, 0.72);
  cursor: pointer;
}

.step-item.active {
  border-color: rgba(94, 234, 212, 0.45);
  background: linear-gradient(135deg, rgba(12, 28, 36, 0.95), rgba(16, 30, 44, 0.95));
}

.step-item .eyebrow {
  color: var(--accent);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.step-item strong {
  display: block;
  margin-top: 0.25rem;
  color: #fff;
}

.step-item span {
  display: block;
  color: var(--muted);
  font-size: 0.82rem;
  margin-top: 0.35rem;
  line-height: 1.4;
}

.wizard-main {
  display: grid;
  gap: 1rem;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 1rem;
  margin-bottom: 1rem;
}

.section-header h3 {
  margin: 0 0 0.2rem;
  font-size: 1.3rem;
}

.section-header p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.pill {
  padding: 0.35rem 0.65rem;
  border-radius: 999px;
  background: rgba(47, 71, 97, 0.32);
  color: var(--muted);
  font-size: 0.78rem;
}

.template-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.9rem;
}

.template-card {
  border: 1px solid rgba(47, 71, 97, 0.62);
  border-radius: 20px;
  padding: 1rem;
  background: rgba(10, 18, 29, 0.88);
  cursor: pointer;
}

.template-card.active {
  border-color: rgba(94, 234, 212, 0.45);
  background: linear-gradient(135deg, rgba(12, 30, 33, 0.95), rgba(18, 33, 49, 0.95));
}

.template-card strong {
  display: block;
  color: #fff;
  margin-bottom: 0.35rem;
}

.template-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.grid {
  display: grid;
  gap: 0.9rem;
}

.grid.two {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field {
  display: grid;
  gap: 0.45rem;
}

.field label {
  color: #fff;
  font-size: 0.9rem;
}

.field small {
  color: var(--muted);
  line-height: 1.45;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  border-radius: 14px;
  border: 1px solid rgba(47, 71, 97, 0.8);
  background: rgba(7, 14, 22, 0.92);
  color: var(--text);
  padding: 0.8rem 0.9rem;
  outline: none;
}

.field textarea {
  min-height: 120px;
  resize: vertical;
}

.agent-card {
  border: 1px solid rgba(47, 71, 97, 0.62);
  border-radius: 20px;
  padding: 1rem;
  background: rgba(10, 18, 29, 0.88);
}

.agent-topbar {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  align-items: start;
  margin-bottom: 0.85rem;
}

.agent-meta strong {
  display: block;
  color: #fff;
  font-size: 1rem;
}

.agent-meta span {
  color: var(--muted);
  font-size: 0.82rem;
}

.button-row {
  display: flex;
  gap: 0.65rem;
  flex-wrap: wrap;
}

.mini-btn {
  background: rgba(47, 71, 97, 0.32);
  color: var(--text);
  padding: 0.45rem 0.7rem;
  border-radius: 10px;
  font-size: 0.82rem;
}

.mini-btn.warn { color: var(--warning); }
.mini-btn.danger { color: var(--danger); }

.review-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 1rem;
}

.status-panel {
  padding: 0.95rem 1rem;
  border-radius: 18px;
  border: 1px solid rgba(47, 71, 97, 0.62);
  background: rgba(9, 16, 26, 0.82);
}

.status-panel.good { border-color: rgba(74, 222, 128, 0.35); }
.status-panel.bad { border-color: rgba(251, 113, 133, 0.45); }

.status-panel ul {
  margin: 0.7rem 0 0;
  padding-left: 1.15rem;
  color: var(--muted);
}

.yaml-box {
  width: 100%;
  min-height: 360px;
  border-radius: 16px;
  border: 1px solid rgba(47, 71, 97, 0.8);
  background: rgba(5, 11, 18, 0.96);
  color: #d5e5f8;
  padding: 1rem;
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.83rem;
  line-height: 1.55;
  white-space: pre;
  overflow: auto;
}

.yaml-editor {
  white-space: pre-wrap;
  resize: vertical;
}

.step-actions {
  display: flex;
  justify-content: space-between;
  gap: 0.9rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.step-actions .right {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.summary-list {
  display: grid;
  gap: 0.75rem;
}

.summary-item {
  padding: 0.85rem 0.95rem;
  border-radius: 16px;
  background: rgba(9, 16, 26, 0.82);
  border: 1px solid rgba(47, 71, 97, 0.5);
}

.summary-item strong {
  display: block;
  color: #fff;
  margin-bottom: 0.3rem;
}

.summary-item span {
  color: var(--muted);
  line-height: 1.5;
}

.readonly-config {
  margin-bottom: 1rem;
}

/* Monitoring view */
.project-bar { display: flex; gap: 1.5rem; padding: 0.9rem 1rem; background: var(--surface); border-radius: 18px; margin-bottom: 1rem; flex-wrap: wrap; border: 1px solid rgba(47, 71, 97, 0.6); }
.project-bar .stat { text-align: center; min-width: 90px; }
.project-bar .stat-value { font-size: 1.25rem; font-weight: 700; color: #fff; }
.project-bar .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.brain-panel { background: var(--surface); border-radius: 18px; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(94, 234, 212, 0.28); }
.brain-panel h2 { font-size: 0.95rem; color: var(--accent); margin: 0 0 0.5rem; }
.brain-meta { display: flex; gap: 1.2rem; font-size: 0.82rem; color: var(--muted); flex-wrap: wrap; }
.zombie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.85rem; margin-bottom: 1rem; }
.zombie-card { background: var(--surface); border-radius: 18px; padding: 1rem; border-left: 3px solid var(--accent-2); border: 1px solid rgba(47, 71, 97, 0.5); }
.zombie-card.done { border-left-color: var(--success); }
.zombie-card.blocked { border-left-color: var(--warning); }
.zombie-card.crashed { border-left-color: var(--danger); border-left-style: dashed; }
.zombie-card.iterator { border-left-color: #f59e0b; grid-column: span 2; }
.zombie-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; gap: 0.75rem; }
.zombie-name { font-weight: 700; color: #fff; font-size: 1rem; }
.zombie-phase { font-size: 0.75rem; padding: 0.25rem 0.65rem; border-radius: 999px; font-weight: 600; }
.phase-starting, .phase-planning { background: rgba(30, 58, 95, 0.8); color: #8fc6ff; }
.phase-blocked, .phase-review { background: rgba(61, 46, 0, 0.8); color: #fcd34d; }
.phase-coding, .phase-monitoring { background: rgba(17, 46, 30, 0.86); color: #86efac; }
.phase-executing { background: rgba(16, 53, 77, 0.86); color: #7dd3fc; }
.phase-ready-for-review, .phase-testing { background: rgba(46, 26, 61, 0.86); color: #d8b4fe; }
.phase-done, .phase-finished { background: rgba(15, 42, 15, 0.88); color: #4ade80; }
.phase-attention, .phase-crashed { background: rgba(61, 16, 16, 0.9); color: #fda4af; }
.phase-iterating { background: rgba(46, 26, 0, 0.86); color: #fcd34d; }
.phase-unknown { background: rgba(30, 30, 30, 0.9); color: #94a3b8; }
.zombie-meta { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
.label { color: #65809d; }
.zombie-summary { font-size: 0.84rem; color: var(--text); margin: 0.6rem 0; padding: 0.55rem 0.7rem; background: rgba(8, 16, 26, 0.9); border-radius: 10px; }
.zombie-message { font-size: 0.76rem; color: #8fc6ff; margin-top: 0.45rem; font-style: italic; }
.artifact-stack { display: grid; gap: 0.45rem; margin-top: 0.65rem; }
.artifact-panel { border: 1px solid rgba(47, 71, 97, 0.62); border-radius: 10px; background: rgba(8, 16, 26, 0.74); overflow: hidden; }
.artifact-panel summary { cursor: pointer; padding: 0.52rem 0.65rem; color: var(--text); font-size: 0.78rem; display: flex; justify-content: space-between; gap: 0.75rem; align-items: center; }
.artifact-panel summary::-webkit-details-marker { display: none; }
.artifact-panel summary::before { content: "+"; color: var(--accent); font-weight: 700; margin-right: 0.35rem; }
.artifact-panel[open] summary::before { content: "-"; }
.artifact-path { color: var(--muted); font-family: "IBM Plex Mono", monospace; font-size: 0.7rem; overflow-wrap: anywhere; text-align: right; }
.artifact-body { margin: 0; padding: 0.75rem; border-top: 1px solid rgba(47, 71, 97, 0.45); max-height: 260px; overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; color: #cbd5e1; font-family: "IBM Plex Mono", monospace; font-size: 0.74rem; line-height: 1.45; background: rgba(4, 9, 15, 0.72); }
.brain-chat { margin-top: 0.85rem; border-top: 1px solid rgba(47, 71, 97, 0.45); padding-top: 0.85rem; display: grid; gap: 0.55rem; }
.brain-chat textarea { width: 100%; min-height: 84px; resize: vertical; border-radius: 10px; border: 1px solid rgba(47, 71, 97, 0.72); background: rgba(4, 9, 15, 0.78); color: var(--text); padding: 0.7rem; line-height: 1.45; }
.brain-chat-row { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.brain-chat-hint { color: var(--muted); font-size: 0.76rem; }
.ctx-bar { height: 6px; background: rgba(30, 45, 61, 0.95); border-radius: 999px; margin: 0.55rem 0; overflow: hidden; }
.ctx-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }
.ctx-fill.low { background: var(--success); }
.ctx-fill.mid { background: var(--warning); }
.ctx-fill.high { background: var(--danger); }
.log-panel { background: rgba(13, 17, 23, 0.94); border: 1px solid rgba(47, 71, 97, 0.62); border-radius: 18px; max-height: 360px; overflow-y: auto; }
.log-panel h2 { font-size: 0.88rem; color: var(--muted); padding: 0.75rem 1rem; border-bottom: 1px solid rgba(47, 71, 97, 0.4); position: sticky; top: 0; background: rgba(13, 17, 23, 0.97); margin: 0; }
.log-entry { padding: 0.4rem 1rem; font-size: 0.77rem; font-family: "IBM Plex Mono", monospace; border-bottom: 1px solid rgba(8, 16, 26, 0.8); display: flex; gap: 0.85rem; }
.log-entry:hover { background: rgba(16, 27, 41, 0.8); }
.log-time { color: #617589; min-width: 65px; }
.log-source { min-width: 110px; font-weight: 600; }
.log-source.brain { color: #c4b5fd; }
.log-source.zombie { color: #7dd3fc; }
.log-source.human { color: #fbbf24; }
.log-msg { color: var(--text); }
.log-msg.commit { color: var(--success); }
.log-msg.feedback { color: #fbbf24; }
.iterate-progress { display: flex; align-items: center; gap: 0.8rem; margin: 0.6rem 0; }
.iterate-bar { flex: 1; height: 6px; background: rgba(30, 45, 61, 0.95); border-radius: 999px; overflow: hidden; }
.iterate-bar-fill { height: 100%; background: #f59e0b; }
.iterate-timeline { font-size: 0.75rem; margin-top: 0.5rem; max-height: 160px; overflow-y: auto; }
.iterate-row { display: flex; gap: 0.5rem; padding: 0.2rem 0; border-bottom: 1px solid rgba(26, 26, 46, 0.8); }
.iterate-row.kept { color: #86efac; }
.iterate-row.champion { color: #fcd34d; font-weight: 600; }
.iterate-row.discarded { color: #64748b; }
.iterate-id { width: 35px; text-align: right; }
.iterate-metric { width: 70px; text-align: right; }
.iterate-verdict { width: 16px; text-align: center; }
.iterate-hyp { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.iterate-champion { background: rgba(26, 21, 0, 0.92); border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 12px; padding: 0.45rem 0.65rem; margin: 0.4rem 0; font-size: 0.8rem; }

@media (max-width: 980px) {
  .wizard-shell { grid-template-columns: 1fr; }
  .wizard-nav { position: static; }
  .review-grid, .grid.two { grid-template-columns: 1fr; }
}

@media (max-width: 720px) {
  header { align-items: start; flex-direction: column; }
  .mode-banner, .step-actions { align-items: start; }
  .project-bar { gap: 1rem; }
  .zombie-card.iterator { grid-column: span 1; }
}
</style>
</head>
<body>
<header>
  <h1>brain-zombies <span id="header-project">workflow editor</span></h1>
  <div class="header-actions">
    <button class="btn-secondary" id="reload-btn">Reload</button>
    <button class="btn-danger" id="teardown-btn" hidden>Kill All</button>
  </div>
</header>
<main>
  <div class="notice" id="notice"></div>
  <div id="content"></div>
</main>
<script>
const appState = {
  configMeta: null,
  draft: null,
  step: 0,
  validation: null,
  yamlPreview: "",
  rawYamlDraft: "",
  rawYamlDirty: false,
  advancedOpen: false,
  mode: "editor",
  status: null,
  pollHandle: null,
  busy: false,
};

const STEP_DEFS = [
  { key: "template", title: "Template", subtitle: "Choose a workflow skeleton to start from." },
  { key: "project", title: "Project", subtitle: "Capture the brief and repo-level defaults." },
  { key: "brain", title: "Brain", subtitle: "Tune the supervisor runtime, model, and cadence." },
  { key: "agents", title: "Agents", subtitle: "Define responsibilities, focus, and dependencies." },
  { key: "review", title: "Review", subtitle: "Validate, inspect YAML, then save or launch." },
];

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function showNotice(message, kind = "info") {
  const notice = document.getElementById("notice");
  if (!message) {
    notice.className = "notice";
    notice.textContent = "";
    return;
  }
  notice.className = `notice visible ${kind}`;
  notice.textContent = message;
}

function setBusy(isBusy) {
  appState.busy = isBusy;
  render();
}

async function api(path, options = {}) {
  const response = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  const text = await response.text();
  let payload = {};
  try {
    payload = text ? JSON.parse(text) : {};
  } catch (err) {
    throw new Error(text || `Request failed: ${response.status}`);
  }
  if (!response.ok) {
    const message = (payload.errors && payload.errors[0]) || payload.message || `Request failed: ${response.status}`;
    const error = new Error(message);
    error.payload = payload;
    error.status = response.status;
    throw error;
  }
  return payload;
}

function defaultModelForRuntime(runtime) {
  if (runtime === "claude") return "sonnet";
  if (runtime === "codex") return "gpt-4.1";
  return "";
}

function currentProjectName() {
  const name = appState.draft?.project?.name || appState.configMeta?.config?.project?.name;
  return name || "workflow editor";
}

function earlierAgentOptions(index) {
  return (appState.draft?.agents || []).slice(0, index).map((agent) => agent.id).filter(Boolean);
}

function scheduleValidation() {
  clearTimeout(scheduleValidation.handle);
  scheduleValidation.handle = setTimeout(() => {
    validateDraft(true);
  }, 250);
}

async function loadConfig() {
  setBusy(true);
  try {
    const meta = await api("/api/config");
    appState.configMeta = meta;
    appState.draft = clone(meta.config);
    if (!appState.draft._selected_preset) {
      appState.draft._selected_preset = meta.selected_preset || "research_build";
    }
    appState.validation = {
      valid: !(meta.validation_errors || []).length,
      errors: meta.validation_errors || [],
    };
    appState.yamlPreview = meta.yaml_preview || "";
    appState.rawYamlDraft = meta.yaml_preview || "";
    appState.rawYamlDirty = false;
    appState.mode = (meta.active_run || meta.has_run_state) ? "monitor" : "editor";
    appState.status = null;
    document.getElementById("teardown-btn").hidden = !meta.active_run;
    document.getElementById("header-project").textContent = appState.mode === "monitor" ? `monitoring ${currentProjectName()}` : `configure ${currentProjectName()}`;

    if (appState.mode === "monitor") {
      if (meta.active_run) startPolling();
      else stopPolling();
      await refreshStatus();
      showNotice(meta.active_run ? "Workflow configuration is locked while a run is active. Tear down the swarm to edit `bz.yaml`." : "Project is sleeping. You can inspect state or message the brain to resume work.", meta.active_run ? "warning" : "info");
    } else {
      stopPolling();
      showNotice(meta.exists ? "Editing the current `bz.yaml`." : "No `bz.yaml` found. Start from a template and save the workflow.", "info");
      await validateDraft(true);
    }
  } catch (err) {
    showNotice(err.message, "error");
  } finally {
    setBusy(false);
  }
}

async function validateDraft(silent = false) {
  if (!appState.draft || appState.mode !== "editor") return;
  try {
    const payload = await api("/api/config/validate", {
      method: "POST",
      body: JSON.stringify({ config: appState.draft }),
    });
    appState.validation = { valid: payload.valid, errors: payload.errors || [] };
    appState.yamlPreview = payload.yaml_preview || "";
    if (!appState.rawYamlDirty) {
      appState.rawYamlDraft = appState.yamlPreview;
    }
    if (!silent && payload.valid) {
      showNotice("Configuration validated.", "success");
    }
  } catch (err) {
    const errors = err.payload?.errors || [err.message];
    appState.validation = { valid: false, errors };
    if (err.payload?.yaml_preview) {
      appState.yamlPreview = err.payload.yaml_preview;
    }
    if (!silent) {
      showNotice(errors[0], "error");
    }
  } finally {
    render();
  }
}

async function refreshStatus() {
  if (appState.mode !== "monitor") return;
  try {
    appState.status = await api("/api/status");
    document.getElementById("header-project").textContent = `monitoring ${appState.status.project.name}`;
    render();
  } catch (err) {
    showNotice(err.message, "error");
  }
}

function startPolling() {
  stopPolling();
  appState.pollHandle = setInterval(refreshStatus, 5000);
}

function stopPolling() {
  if (appState.pollHandle) {
    clearInterval(appState.pollHandle);
    appState.pollHandle = null;
  }
}

function updateProjectField(field, value) {
  appState.draft.project[field] = value;
  document.getElementById("header-project").textContent = `configure ${currentProjectName()}`;
  scheduleValidation();
  render();
}

function updateSupervisorField(field, value) {
  if (field === "runtime") {
    const oldRuntime = appState.draft.supervisor.runtime;
    const oldDefault = defaultModelForRuntime(oldRuntime);
    appState.draft.supervisor.runtime = value;
    if (!appState.draft.supervisor.model || appState.draft.supervisor.model === oldDefault) {
      appState.draft.supervisor.model = defaultModelForRuntime(value);
    }
  } else if (field === "proactive_check_mins" || field === "zombie_heartbeat_mins") {
    appState.draft.supervisor[field] = value === "" ? (field === "zombie_heartbeat_mins" ? 10 : 15) : Number(value);
  } else {
    appState.draft.supervisor[field] = value;
  }
  scheduleValidation();
  render();
}

function updateGitField(field, value) {
  appState.draft.git[field] = field === "auto_pr" ? value === true || value === "true" : value;
  scheduleValidation();
  render();
}

function updateAgentField(index, field, value) {
  const agent = appState.draft.agents[index];
  if (!agent) return;
  if (field === "runtime") {
    const oldRuntime = agent.runtime;
    const oldDefault = defaultModelForRuntime(oldRuntime);
    agent.runtime = value;
    if (!agent.model || agent.model === oldDefault) {
      agent.model = defaultModelForRuntime(value);
    }
  } else if (field === "focus") {
    agent.focus = value.split(/[\n,]/).map((item) => item.trim()).filter(Boolean);
  } else {
    agent[field] = value;
  }
  if (field === "dependency_mode" && value !== "custom") {
    agent.custom_blocked_until = value === "after-agent" ? agent.custom_blocked_until || agent.blocked_until || "" : "";
  }
  scheduleValidation();
  render();
}

function addAgent() {
  const nextIndex = (appState.draft.agents || []).length + 1;
  const runtime = appState.draft.supervisor.runtime || "claude";
  appState.draft.agents.push({
    id: `agent-${nextIndex}`,
    runtime,
    model: defaultModelForRuntime(runtime),
    task: "Define the work for this agent.",
    focus: [],
    thinking: "",
    role: "",
    blocked_until: "",
    dependency_mode: "immediate",
    dependency_target: "",
    custom_blocked_until: "",
  });
  appState.step = 3;
  scheduleValidation();
  render();
}

function moveAgent(index, delta) {
  const target = index + delta;
  if (target < 0 || target >= appState.draft.agents.length) return;
  const next = clone(appState.draft.agents);
  [next[index], next[target]] = [next[target], next[index]];
  appState.draft.agents = next;
  scheduleValidation();
  render();
}

function removeAgent(index) {
  appState.draft.agents.splice(index, 1);
  scheduleValidation();
  render();
}

function applyPreset(presetId) {
  const preset = (appState.configMeta?.presets || []).find((item) => item.id === presetId);
  if (!preset || !preset.config) return;
  const currentProject = clone(appState.draft?.project || {});
  appState.draft = clone(preset.config);
  appState.draft.project.name = currentProject.name || appState.draft.project.name;
  appState.draft.project.brief = currentProject.brief || appState.draft.project.brief;
  appState.draft._selected_preset = presetId;
  appState.step = 1;
  appState.advancedOpen = false;
  appState.rawYamlDirty = false;
  appState.yamlPreview = "";
  appState.rawYamlDraft = "";
  scheduleValidation();
  render();
}

async function applyYamlEditor() {
  setBusy(true);
  try {
    const payload = await api("/api/config/validate", {
      method: "POST",
      body: JSON.stringify({ raw_yaml: appState.rawYamlDraft }),
    });
    appState.draft = clone(payload.normalized_config);
    appState.validation = { valid: payload.valid, errors: payload.errors || [] };
    appState.yamlPreview = payload.yaml_preview || "";
    appState.rawYamlDraft = appState.yamlPreview;
    appState.rawYamlDirty = false;
    showNotice("Advanced YAML applied to the form.", "success");
  } catch (err) {
    const errors = err.payload?.errors || [err.message];
    appState.validation = { valid: false, errors };
    showNotice(errors[0], "error");
  } finally {
    setBusy(false);
    render();
  }
}

async function saveDraft() {
  setBusy(true);
  try {
    const body = appState.rawYamlDirty
      ? { raw_yaml: appState.rawYamlDraft }
      : { config: appState.draft };
    const payload = await api("/api/config/save", {
      method: "POST",
      body: JSON.stringify(body),
    });
    appState.draft = clone(payload.normalized_config);
    appState.yamlPreview = payload.yaml_preview || "";
    appState.rawYamlDraft = appState.yamlPreview;
    appState.rawYamlDirty = false;
    appState.validation = { valid: true, errors: [] };
    showNotice("Saved `bz.yaml`.", "success");
  } catch (err) {
    const errors = err.payload?.errors || [err.message];
    appState.validation = { valid: false, errors };
    if (err.payload?.yaml_preview) {
      appState.yamlPreview = err.payload.yaml_preview;
    }
    showNotice(errors[0], "error");
  } finally {
    setBusy(false);
    render();
  }
}

async function launchWorkflow() {
  setBusy(true);
  try {
    const body = appState.rawYamlDirty
      ? { raw_yaml: appState.rawYamlDraft }
      : { config: appState.draft };
    await api("/api/launch", {
      method: "POST",
      body: JSON.stringify(body),
    });
    showNotice("Workflow launched. Switching to live monitoring.", "success");
    await loadConfig();
  } catch (err) {
    const errors = err.payload?.errors || [err.message];
    showNotice(errors[0], "error");
    appState.validation = { valid: false, errors };
    render();
  } finally {
    setBusy(false);
  }
}

async function teardownAll() {
  if (!confirm("Kill all zombies and stop the brain?")) return;
  setBusy(true);
  try {
    const payload = await api("/api/teardown", { method: "POST", body: JSON.stringify({}) });
    showNotice(`Teardown complete. ${payload.killed.length} process group(s) stopped.`, "success");
    await loadConfig();
  } catch (err) {
    showNotice(err.message, "error");
  } finally {
    setBusy(false);
  }
}

async function sendBrainChat() {
  const input = document.getElementById("brain-chat-input");
  const message = (input?.value || "").trim();
  if (!message) {
    showNotice("Write a message to the brain first.", "warning");
    return;
  }
  setBusy(true);
  try {
    const payload = await api("/api/brain/chat", {
      method: "POST",
      body: JSON.stringify({ message }),
    });
    input.value = "";
    const queued = payload.queued_targets?.length ? ` Queued: ${payload.queued_targets.join(", ")}.` : "";
    showNotice(`${payload.reply || "Brain responded."}${queued}`, "success");
    await loadConfig();
  } catch (err) {
    showNotice(err.payload?.errors?.[0] || err.message, "error");
  } finally {
    setBusy(false);
  }
}

    renderReviewStep(),
  ];
  return sections[appState.step];
}

function renderEditor() {
  return `
    <div class="mode-banner">
      <div>
        <strong>Setup mode</strong><br>
        Build or revise <code>bz.yaml</code> before launching the swarm. This editor writes the same config the CLI consumes.
      </div>
      <div class="button-row">
        <span class="pill">${appState.configMeta?.exists ? "Editing existing config" : "New config"}</span>
        <span class="pill">${(appState.draft?.agents || []).length} agent(s)</span>
      </div>
    </div>
    <div class="wizard-shell">
      ${renderStepNav()}
      <div class="wizard-main">
        ${renderStepContent()}
        <div class="section-card">
          <div class="step-actions">
            <div>
              <button class="btn-secondary" data-action="prev-step" ${appState.step === 0 ? "disabled" : ""}>Back</button>
            </div>
            <div class="right">
              ${appState.step === 4 ? `
                <button class="btn-ghost" data-action="validate" ${appState.busy ? "disabled" : ""}>Validate</button>
                <button class="btn-secondary" data-action="save" ${appState.busy ? "disabled" : ""}>Save Draft</button>
                <button class="btn-primary" data-action="launch" ${appState.busy ? "disabled" : ""}>Save + Launch</button>
              ` : `
                <button class="btn-primary" data-action="next-step">Continue</button>
              `}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderIteratorCard(zombie) {
  const iterate = zombie.iterate;
  const used = iterate.used || 0;
  const budget = iterate.budget || 20;
  const pct = Math.round((used / budget) * 100) || 0;
  const champIter = iterate.champion_iteration || 0;
  const goalStr = Object.entries(iterate.goal || {}).map(([key, value]) => `${key} ${value}`).join(", ");
  const champion = Object.entries(iterate.champion_metrics || {}).filter(([, value]) => typeof value === "number").map(([key, value]) => `${key}=${value.toFixed(4)}`).join(", ");
  const primaryMetric = Object.keys(iterate.goal || {})[0] || "ic";
  const timeline = (iterate.iterations || []).slice(-12).map((row) => {
    const mark = row.kept ? (row.id === champIter ? "★" : "►") : "✗";
    const cls = row.kept ? (row.id === champIter ? "champion" : "kept") : "discarded";
    const metric = row.metrics && row.metrics[primaryMetric] != null ? row.metrics[primaryMetric].toFixed(4) : "—";
    return `
      <div class="iterate-row ${cls}">
        <span class="iterate-id">${row.id}</span>
        <span class="iterate-verdict">${mark}</span>
        <span class="iterate-metric">${metric}</span>
        <span class="iterate-hyp">${escapeHtml((row.hypothesis || "").slice(0, 52))}</span>
      </div>
    `;
  }).join("");
  return `
    <div class="zombie-card iterator">
      <div class="zombie-header">
        <span class="zombie-name">🔄 ${escapeHtml(zombie.id)} <span style="font-weight:400;color:#f59e0b;font-size:0.8rem">(iterator)</span></span>
        <span class="zombie-phase phase-iterating">${escapeHtml(iterate.state || zombie.phase)} ${used}/${budget}</span>
      </div>
      <div class="zombie-meta">
        <span class="label">Goal:</span> ${escapeHtml(goalStr || "—")} ·
        <span class="label">Brain:</span> ${escapeHtml(zombie.model || "—")} ·
        <span class="label">Zombie:</span> ${escapeHtml(iterate.zombie_model || "—")}
      </div>
      <div class="iterate-progress">
        <div class="iterate-bar"><div class="iterate-bar-fill" style="width:${pct}%"></div></div>
        <span style="font-size:0.75rem;color:#f59e0b">${pct}%</span>
      </div>
      ${champion ? `<div class="iterate-champion">★ Champion (iter ${champIter}): ${escapeHtml(champion)}</div>` : ""}
      <div class="iterate-timeline">${timeline || '<div style="color:#64748b;font-size:0.75rem">No iterations yet</div>'}</div>
    </div>
  `;
}

function sourceClass(source) {
  if ((source || "").includes("brain") || (source || "").includes("nerve")) return "brain";
  if ((source || "").includes("human")) return "human";
  return "zombie";
}

function ctxClass(pct) {
  if (pct > 70) return "high";
  if (pct > 40) return "mid";
  return "low";
}

function phaseClass(phase) {
  return `phase-${phase || "unknown"}`;
}

function renderArtifactPanel(title, artifact, open = false) {
  if (!artifact || !artifact.content) return "";
  return `
    <details class="artifact-panel" ${open ? "open" : ""}>
      <summary><span>${escapeHtml(title)}</span><span class="artifact-path">${escapeHtml(artifact.path || "")}</span></summary>
      <pre class="artifact-body">${escapeHtml(artifact.content)}</pre>
    </details>
  `;
}

function renderMonitor() {
  if (!appState.status) {
    return `
      <div class="mode-banner">
        <div><strong>Loading live status…</strong><br>Waiting for the monitor payload from <code>/api/status</code>.</div>
      </div>
    `;
  }

  const data = appState.status;
  const configYaml = appState.configMeta?.yaml_preview || appState.yamlPreview || "";
  const totalTokensK = ((data.cost.total_tokens || 0) / 1000).toFixed(0);

  const zombiesHtml = data.zombies.map((zombie) => {
    if (zombie.iterate) return renderIteratorCard(zombie);
    const cardClass = zombie.phase === "crashed" ? "crashed" : zombie.phase === "blocked" ? "blocked" : (zombie.phase === "done" || zombie.phase === "finished") ? "done" : "";
    return `
      <div class="zombie-card ${cardClass}">
        <div class="zombie-header">
          <span class="zombie-name">🧟 ${escapeHtml(zombie.id)}</span>
          <span class="zombie-phase ${phaseClass(zombie.phase)}">${escapeHtml(zombie.phase)}</span>
        </div>
        <div class="zombie-meta">
          <span class="label">Model:</span> ${escapeHtml(zombie.model_display || zombie.model || "—")}${zombie.thinking_mode ? ` · <span style="color:#c4b5fd">⚡${escapeHtml(zombie.thinking_mode)}</span>` : ' · <span style="color:#64748b">No Thinking</span>'}
          ${zombie.last_updated ? ` · <span class="label">Updated:</span> ${escapeHtml(zombie.last_updated)}` : ""}<br>
          <span class="label">Action:</span> ${escapeHtml(zombie.action || "—")} · <span class="label">Needs brain:</span> ${escapeHtml(zombie.needs_brain || "no")}<br>
          <span class="label">Depends on:</span> ${escapeHtml(zombie.depends_on || "none")} · <span class="label">Commits:</span> ${escapeHtml(zombie.commit_count)} · <span class="label">Files:</span> ${escapeHtml(zombie.file_count)} (${escapeHtml(zombie.files || "none")})
        </div>
        <div class="ctx-bar" title="${escapeHtml((zombie.total_tokens || 0).toLocaleString())} / ${escapeHtml((zombie.context_max || 0).toLocaleString())} tokens (${escapeHtml(zombie.context_pct)}%)">
          <div class="ctx-fill ${ctxClass(zombie.context_pct)}" style="width:${Math.min(zombie.context_pct || 0, 100)}%"></div>
        </div>
        <div class="zombie-meta">
          <span class="label">Tokens:</span> ${(((zombie.input_tokens || 0) + (zombie.cache_write || 0) + (zombie.cache_read || 0) + (zombie.output_tokens || 0)) / 1000).toFixed(1)}k
          · <span class="label">Cost:</span> $${Number(zombie.estimated_cost || 0).toFixed(2)}
        </div>
        <div class="zombie-summary">${escapeHtml(zombie.summary || "No summary")}</div>
        ${zombie.next_step ? `<div class="zombie-meta"><span class="label">Next:</span> ${escapeHtml(zombie.next_step)}</div>` : ""}
        ${zombie.blocker && zombie.blocker !== "none" ? `<div class="zombie-meta"><span class="label">Blocker:</span> ${escapeHtml(zombie.blocker)}</div>` : ""}
        ${zombie.memory_excerpt ? `<div class="zombie-message">Memory: ${escapeHtml(zombie.memory_excerpt)}</div>` : ""}
        <div class="artifact-stack">
          ${renderArtifactPanel("Memory", zombie.memory, false)}
          ${renderArtifactPanel("Brain Chatlog", zombie.chatlog, false)}
        </div>
      </div>
    `;
  }).join("");

  const messages = (data.messages || []).map((message) => `
    <div class="log-entry">
      <span class="log-time">${escapeHtml(message.time || "")}</span>
      <span class="log-source ${sourceClass((message.from || "").toLowerCase())}">${escapeHtml(message.from || "")}${message.to ? ` → ${escapeHtml(message.to)}` : ""}</span>
      <span class="log-msg ${escapeHtml(message.type || "")}">${escapeHtml(message.message || "")}</span>
    </div>
  `).join("");

  return `
    <div class="mode-banner">
      <div>
        <strong>${appState.configMeta?.active_run ? "Live run is active" : "Project is sleeping"}</strong><br>
        ${appState.configMeta?.active_run ? "Workflow edits are disabled while tmux sessions or the reconcile loop are running. Use <code>Kill All</code> or <code>bz teardown</code>, then return to setup mode." : "Background agent tasks are stopped, but DuckDB state, memories, and chatlogs are available. Message the brain to resume work."}
      </div>
      <span class="pill">${escapeHtml(data.project.name)}</span>
    </div>

    <div class="section-card readonly-config">
      <div class="section-header">
        <div>
          <h3>Read-only Workflow Config</h3>
          <p>The live swarm is using this saved <code>bz.yaml</code>. Editing is locked until teardown.</p>
        </div>
        <span class="pill">Read only</span>
      </div>
      <pre class="yaml-box">${escapeHtml(configYaml || "# No bz.yaml available")}</pre>
    </div>

    <div class="project-bar">
      <div class="stat"><div class="stat-value">${escapeHtml(String(data.project.state || "").toUpperCase())}</div><div class="stat-label">Status</div></div>
      <div class="stat"><div class="stat-value">${escapeHtml(data.project.zombies_done)}/${escapeHtml(data.project.zombies_total)}</div><div class="stat-label">Zombies Done</div></div>
      <div class="stat"><div class="stat-value">${escapeHtml(data.project.total_commits)}</div><div class="stat-label">Commits</div></div>
      <div class="stat"><div class="stat-value">${escapeHtml(data.project.elapsed_display)}</div><div class="stat-label">Elapsed</div></div>
      <div class="stat"><div class="stat-value">${escapeHtml(totalTokensK)}k</div><div class="stat-label">Total Tokens</div></div>
      <div class="stat"><div class="stat-value">$${Number(data.cost.total || 0).toFixed(2)}</div><div class="stat-label">Total Cost</div></div>
    </div>

    <div class="brain-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.55rem;gap:0.7rem;">
        <h2>🧠 Brain (Supervisor)</h2>
        <span class="zombie-phase ${phaseClass(data.brain.status === "attention" ? "attention" : (data.brain.status === "idle" ? "done" : "monitoring"))}">${escapeHtml(data.brain.status)}</span>
      </div>
      <div class="brain-meta">
        <span><span class="label">Model:</span> ${escapeHtml(data.brain.model_display || data.brain.model || "—")}${data.brain.thinking_mode ? ` · <span style="color:#c4b5fd">⚡${escapeHtml(data.brain.thinking_mode)}</span>` : ' · <span style="color:#64748b">No Thinking</span>'}</span>
      </div>
      <div class="brain-meta" style="margin-top:0.35rem;">
        <span><span class="label">Tokens:</span> ${((((data.brain.input_tokens || 0) + (data.brain.cache_write || 0) + (data.brain.cache_read || 0) + (data.brain.output_tokens || 0)) / 1000).toFixed(1))}k · <span class="label">Cost:</span> $${Number(data.brain.estimated_cost || 0).toFixed(2)} · <span class="label">Active Requests:</span> ${escapeHtml(data.brain.active_requests || 0)}</span>
      </div>
      ${data.brain.memory_excerpt ? `<div class="zombie-summary" style="margin-top:0.75rem;"><strong>Brain Memory:</strong> ${escapeHtml(data.brain.memory_excerpt)}</div>` : ""}
      <div class="artifact-stack">
        ${renderArtifactPanel("Brain Memory", data.brain.memory, false)}
        ${renderArtifactPanel("Shared Memory", data.brain.shared_memory, false)}
        ${renderArtifactPanel("User Brain Chatlog", data.brain.chatlog, false)}
      </div>
      <div class="brain-chat">
        <textarea id="brain-chat-input" placeholder="Message the brain about follow-up work, clarification, review, or a new direction..."></textarea>
        <div class="brain-chat-row">
          <span class="brain-chat-hint">${appState.configMeta?.active_run ? "Message is sent to the active brain." : "Project is sleeping; sending a message wakes the brain and resumes zombies only if it queues work."}</span>
          <button class="btn-primary" data-action="send-brain-chat" ${appState.busy ? "disabled" : ""}>Send to Brain</button>
        </div>
      </div>
    </div>

    <div class="zombie-grid">${zombiesHtml}</div>

    <div class="log-panel">
      <h2>Message Log</h2>
      <div id="log-entries">${messages}</div>
    </div>
  `;
}

function render() {
  const content = document.getElementById("content");
  document.getElementById("reload-btn").disabled = appState.busy;
  document.getElementById("teardown-btn").disabled = appState.busy;

  if (!appState.configMeta || !appState.draft) {
    content.innerHTML = `
      <div class="section-card">
        <div class="section-header">
          <div>
            <h3>Loading dashboard</h3>
            <p>Fetching configuration and run state from the local dashboard server.</p>
          </div>
        </div>
      </div>
    `;
    return;
  }

  content.innerHTML = appState.mode === "monitor" ? renderMonitor() : renderEditor();
}

document.addEventListener("click", (event) => {
  const trigger = event.target.closest("[data-action]");
  if (!trigger) return;

  const { action } = trigger.dataset;
  if (action === "step") {
    appState.step = Number(trigger.dataset.step);
    render();
  } else if (action === "prev-step") {
    appState.step = Math.max(0, appState.step - 1);
    render();
  } else if (action === "next-step") {
    appState.step = Math.min(STEP_DEFS.length - 1, appState.step + 1);
    if (appState.step === STEP_DEFS.length - 1) {
      validateDraft(true);
    } else {
      render();
    }
  } else if (action === "preset") {
    applyPreset(trigger.dataset.preset);
  } else if (action === "add-agent") {
    addAgent();
  } else if (action === "move-agent") {
    moveAgent(Number(trigger.dataset.index), Number(trigger.dataset.delta));
  } else if (action === "remove-agent") {
    removeAgent(Number(trigger.dataset.index));
  } else if (action === "toggle-advanced") {
    appState.advancedOpen = !appState.advancedOpen;
    if (appState.advancedOpen && !appState.rawYamlDirty) {
      appState.rawYamlDraft = appState.yamlPreview;
    }
    render();
  } else if (action === "apply-yaml") {
    applyYamlEditor();
  } else if (action === "reset-yaml") {
    appState.rawYamlDraft = appState.yamlPreview;
    appState.rawYamlDirty = false;
    render();
  } else if (action === "validate") {
    validateDraft(false);
  } else if (action === "save") {
    saveDraft();
  } else if (action === "launch") {
    launchWorkflow();
  } else if (action === "send-brain-chat") {
    sendBrainChat();
  }
});

document.addEventListener("input", (event) => {
  const target = event.target;
  const action = target.dataset.action;
  if (!action) return;

  if (action === "project-field") {
    updateProjectField(target.dataset.field, target.value);
  } else if (action === "supervisor-field") {
    updateSupervisorField(target.dataset.field, target.value);
  } else if (action === "git-field") {
    updateGitField(target.dataset.field, target.value);
  } else if (action === "agent-field") {
    updateAgentField(Number(target.dataset.index), target.dataset.field, target.value);
  } else if (action === "advanced-yaml") {
    appState.rawYamlDraft = target.value;
    appState.rawYamlDirty = appState.rawYamlDraft !== appState.yamlPreview;
  }
});

document.getElementById("reload-btn").addEventListener("click", loadConfig);
document.getElementById("teardown-btn").addEventListener("click", teardownAll);

loadConfig();
</script>
</body>
</html>
