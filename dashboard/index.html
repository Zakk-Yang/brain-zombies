<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brain-zombies</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0e17; color: #c8d0da; min-height: 100vh; }

header { padding: 1.2rem 1.5rem 0.8rem; border-bottom: 1px solid #1e2d3d; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 1.3rem; color: #fff; }
header h1 span { opacity: 0.5; font-weight: 400; font-size: 0.9rem; }
.updated { font-size: 0.75rem; color: #556; }

main { max-width: 1200px; margin: 0 auto; padding: 1rem; }

/* Project bar */
.project-bar { display: flex; gap: 1.5rem; padding: 0.8rem 1rem; background: #111827; border-radius: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.project-bar .stat { text-align: center; }
.project-bar .stat-value { font-size: 1.3rem; font-weight: 700; color: #fff; }
.project-bar .stat-label { font-size: 0.7rem; color: #556; text-transform: uppercase; letter-spacing: 0.5px; }

/* Brain panel */
.brain-panel { background: #111827; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border-left: 3px solid #a78bfa; }
.brain-panel h2 { font-size: 0.9rem; color: #a78bfa; margin-bottom: 0.5rem; }
.brain-meta { display: flex; gap: 1.5rem; font-size: 0.8rem; color: #8899aa; flex-wrap: wrap; }

/* Zombie grid */
.zombie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.8rem; margin-bottom: 1rem; }
.zombie-card { background: #111827; border-radius: 8px; padding: 1rem; border-left: 3px solid #3b82f6; }
.zombie-card.done { border-left-color: #22c55e; }
.zombie-card.blocked { border-left-color: #eab308; }
.zombie-card.stuck { border-left-color: #ef4444; }
.zombie-card.crashed { border-left-color: #ef4444; border-left-style: dashed; }

.zombie-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
.zombie-name { font-weight: 700; color: #fff; font-size: 1rem; }
.zombie-phase { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.phase-starting { background: #1e3a5f; color: #60a5fa; }
.phase-planning { background: #1e3a5f; color: #60a5fa; }
.phase-blocked { background: #3d2e00; color: #eab308; }
.phase-coding { background: #1a2e1a; color: #4ade80; }
.phase-executing { background: #1a2e3d; color: #38bdf8; }
.phase-testing { background: #2e1a3d; color: #c084fc; }
.phase-review { background: #3d2e00; color: #eab308; }
.phase-ready-for-review { background: #2e1a3d; color: #c084fc; }
.phase-done { background: #0f2a0f; color: #22c55e; }
.phase-finished { background: #0a1f0a; color: #16a34a; font-weight: bold; }
.phase-iterating { background: #2e1a00; color: #f59e0b; }
.phase-attention { background: #3d1010; color: #fca5a5; }
.phase-unknown { background: #1e1e1e; color: #666; }

/* Iterator card */
.zombie-card.iterator { border-left-color: #f59e0b; }
.iterate-timeline { font-size: 0.75rem; margin-top: 0.5rem; max-height: 160px; overflow-y: auto; }
.iterate-row { display: flex; gap: 0.5rem; padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
.iterate-row.kept { color: #4ade80; }
.iterate-row.champion { color: #f59e0b; font-weight: 600; }
.iterate-row.discarded { color: #556; }
.iterate-row.running { color: #38bdf8; }
.iterate-id { width: 35px; text-align: right; }
.iterate-metric { width: 70px; text-align: right; }
.iterate-verdict { width: 16px; text-align: center; }
.iterate-hyp { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.iterate-progress { display: flex; align-items: center; gap: 0.8rem; margin: 0.5rem 0; }
.iterate-bar { flex: 1; height: 6px; background: #1e2d3d; border-radius: 3px; overflow: hidden; }
.iterate-bar-fill { height: 100%; background: #f59e0b; border-radius: 3px; transition: width 0.3s; }
.iterate-champion { background: #1a1500; border: 1px solid #f59e0b33; border-radius: 6px; padding: 0.4rem 0.6rem; margin: 0.4rem 0; font-size: 0.8rem; }

.phase-crashed { background: #3d1010; color: #ef4444; animation: blink 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes blink { 50% { opacity: 0.3; } }

.zombie-meta { font-size: 0.78rem; color: #8899aa; line-height: 1.6; }
.zombie-meta .label { color: #556; }
.zombie-summary { font-size: 0.82rem; color: #c8d0da; margin: 0.5rem 0; padding: 0.4rem 0.6rem; background: #0a0e17; border-radius: 4px; }
.zombie-message { font-size: 0.75rem; color: #60a5fa; margin-top: 0.4rem; font-style: italic; }

/* Context bar */
.ctx-bar { height: 4px; background: #1e2d3d; border-radius: 2px; margin: 0.4rem 0; overflow: hidden; cursor: help; }
.ctx-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.ctx-fill.low { background: #22c55e; }
.ctx-fill.mid { background: #eab308; }
.ctx-fill.high { background: #ef4444; }

/* Cost bar */
.cost-bar { display: flex; gap: 1rem; padding: 0.6rem 1rem; background: #111827; border-radius: 8px; margin-bottom: 1rem; font-size: 0.8rem; flex-wrap: wrap; }
.cost-item { color: #8899aa; }
.cost-item strong { color: #22c55e; }

/* Message log */
.log-panel { background: #0d1117; border: 1px solid #1e2d3d; border-radius: 8px; max-height: 350px; overflow-y: auto; }
.log-panel h2 { font-size: 0.85rem; color: #556; padding: 0.6rem 1rem; border-bottom: 1px solid #1e2d3d; position: sticky; top: 0; background: #0d1117; }
.log-entry { padding: 0.25rem 1rem; font-size: 0.75rem; font-family: monospace; border-bottom: 1px solid #0a0e17; display: flex; gap: 0.8rem; }
.log-entry:hover { background: #111827; }
.log-time { color: #4a5568; min-width: 65px; }
.log-source { min-width: 100px; font-weight: 600; }
.log-source.brain { color: #a78bfa; }
.log-source.zombie { color: #60a5fa; }
.log-source.human { color: #f59e0b; }
.log-msg { color: #c8d0da; }
.log-msg.commit { color: #22c55e; }
.log-msg.feedback { color: #f59e0b; }
.log-msg.decision { color: #a78bfa; font-weight: 600; }
.log-msg.brain { color: #a78bfa; }
</style>
</head>
<body>
<header>
  <h1>🧠🧟 brain-zombies <span id="project-name"></span></h1>
  <div style="display:flex;align-items:center;gap:1rem;">
    <button id="teardown-btn" onclick="teardownAll()" style="background:#dc2626;color:#fff;border:none;padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:600;">Kill All</button>
    <div class="updated" id="updated"></div>
  </div>
</header>
<main>
  <div class="project-bar" id="project-bar"></div>
  <div class="brain-panel" id="brain-panel"></div>
  <div class="zombie-grid" id="zombie-grid"></div>
  <div class="cost-bar" id="cost-bar"></div>
  <div class="log-panel" id="log-panel"><h2>Message Log</h2><div id="log-entries"></div></div>
</main>
<script>
async function teardownAll() {
  if (!confirm('Kill all zombies and stop the brain?')) return;
  const btn = document.getElementById('teardown-btn');
  btn.textContent = 'Killing...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/teardown', { method: 'POST' });
    const data = await res.json();
    btn.textContent = `Killed ${data.killed.length}`;
    btn.style.background = '#374151';
    setTimeout(() => { btn.textContent = 'Kill All'; btn.disabled = false; btn.style.background = '#dc2626'; }, 3000);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Kill All'; btn.disabled = false; }, 2000);
  }
}
function renderIteratorCard(z) {
  const it = z.iterate;
  const used = it.used || 0;
  const budget = it.budget || 20;
  const pct = Math.round(used / budget * 100);
  const champIter = it.champion_iteration || 0;
  const goalStr = Object.entries(it.goal || {}).map(([k,v]) => `${k} ${v}`).join(', ');

  // Champion metrics
  const champMetrics = it.champion_metrics || {};
  const champStr = Object.entries(champMetrics)
    .filter(([k,v]) => typeof v === 'number')
    .map(([k,v]) => `${k}=${v.toFixed(4)}`)
    .join(', ');

  // Primary metric for timeline (first goal metric)
  const primaryMetric = Object.keys(it.goal || {})[0] || 'ic';

  // Timeline rows
  let timelineHtml = '';
  for (const row of (it.iterations || []).slice(-12)) {
    const mark = row.kept ? (row.id === champIter ? '★' : '►') : '✗';
    const cls = row.kept ? (row.id === champIter ? 'champion' : 'kept') : 'discarded';
    const mVal = (row.metrics && row.metrics[primaryMetric]) != null
      ? row.metrics[primaryMetric].toFixed(4) : '—';
    const hyp = (row.hypothesis || '').substring(0, 50);
    timelineHtml += `<div class="iterate-row ${cls}">
      <span class="iterate-id">${row.id}</span>
      <span class="iterate-verdict">${mark}</span>
      <span class="iterate-metric">${mVal}</span>
      <span class="iterate-hyp">${hyp}</span>
    </div>`;
  }

  const stateLabel = it.state || z.phase || 'iterating';
  return `
    <div class="zombie-card iterator" style="grid-column: span 2;">
      <div class="zombie-header">
        <span class="zombie-name">🔄 ${z.id} <span style="font-weight:400;color:#f59e0b;font-size:0.8rem">(iterator)</span></span>
        <span class="zombie-phase phase-iterating">${stateLabel} ${used}/${budget}</span>
      </div>
      <div class="zombie-meta">
        <span class="label">Goal:</span> ${goalStr || '—'} ·
        <span class="label">Brain:</span> ${z.model || 'opus'} ·
        <span class="label">Zombie:</span> ${it.zombie_model || 'sonnet'}
      </div>
      <div class="iterate-progress">
        <div class="iterate-bar"><div class="iterate-bar-fill" style="width:${pct}%"></div></div>
        <span style="font-size:0.75rem;color:#f59e0b">${pct}%</span>
      </div>
      ${champStr ? `<div class="iterate-champion">★ Champion (iter ${champIter}): ${champStr}</div>` : ''}
      <div class="iterate-timeline">${timelineHtml || '<div style="color:#556;font-size:0.75rem">No iterations yet</div>'}</div>
    </div>
  `;
}
function phaseClass(p) { return `phase-${p || 'unknown'}`; }
function ctxClass(pct) { return pct > 70 ? 'high' : pct > 40 ? 'mid' : 'low'; }
function sourceClass(s) {
  if (s.includes('BRAIN') || s.includes('nerve')) return 'brain';
  if (s.includes('HUMAN')) return 'human';
  return 'zombie';
}

function render(data) {
  document.getElementById('project-name').textContent = `— ${data.project.name}`;
  document.getElementById('updated').textContent = `Last Update: ${data.updated_at}`;

  // Project bar
  const totalTokensK = ((data.cost.total_tokens || 0) / 1000).toFixed(0);
  document.getElementById('project-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${data.project.state.toUpperCase()}</div><div class="stat-label">Status</div></div>
    <div class="stat"><div class="stat-value">${data.project.zombies_done}/${data.project.zombies_total}</div><div class="stat-label">Zombies Done</div></div>
    <div class="stat"><div class="stat-value">${data.project.total_commits}</div><div class="stat-label">Commits</div></div>
    <div class="stat"><div class="stat-value">${data.project.elapsed_display}</div><div class="stat-label">Elapsed${data.project.state === 'complete' ? ' (final)' : ''}</div></div>
    <div class="stat"><div class="stat-value">${totalTokensK}k</div><div class="stat-label">Total Tokens</div></div>
    <div class="stat"><div class="stat-value">$${data.cost.total.toFixed(2)}</div><div class="stat-label">Total Cost</div></div>
  `;

  // Brain
  const brainStatus = data.brain.status;
  const brainPhaseClass = brainStatus === 'idle' ? 'phase-done' : (brainStatus === 'attention' ? 'phase-attention' : 'phase-coding');
  const brainIn = ((data.brain.input_tokens || 0) + (data.brain.cache_write || 0) + (data.brain.cache_read || 0)) / 1000;
  const brainOut = (data.brain.output_tokens || 0) / 1000;
  const brainTotal = brainIn + brainOut;
  document.getElementById('brain-panel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
      <h2 style="margin:0">🧠 Brain (Supervisor)</h2>
      <span class="zombie-phase ${brainPhaseClass}">${brainStatus}</span>
    </div>
    <div class="brain-meta">
      <span><span class="label">Model:</span> ${data.brain.model_display || data.brain.model}${data.brain.thinking_mode ? ` · <span style="color:#a78bfa">⚡${data.brain.thinking_mode}</span>` : ' · <span style="color:#666">No Thinking</span>'}</span>
    </div>
    <div class="brain-meta" style="margin-top:0.3rem">
      <span><span class="label">Tokens:</span> ${brainTotal.toFixed(1)}k (In: ${brainIn.toFixed(1)}k Out: ${brainOut.toFixed(1)}k) · <span class="label">Cost:</span> $${data.brain.estimated_cost.toFixed(2)} · <span class="label">Active Requests:</span> ${data.brain.active_requests || 0}</span>
    </div>
    ${data.brain.memory_excerpt ? `<div class="zombie-summary" style="margin-top:0.6rem"><strong>Brain Memory:</strong> ${data.brain.memory_excerpt}</div>` : ''}
  `;

  // Zombies
  let html = '';
  for (const z of data.zombies) {
    if (z.iterate) {
      // Iterator card — special rendering
      html += renderIteratorCard(z);
    } else {
      // Regular zombie card
      const cardClass = z.phase === 'crashed' ? 'crashed' : z.phase === 'blocked' ? 'blocked' : (z.phase === 'done' || z.phase === 'finished') ? 'done' : '';
      html += `
        <div class="zombie-card ${cardClass}">
          <div class="zombie-header">
            <span class="zombie-name">🧟 ${z.id}</span>
            <span class="zombie-phase ${phaseClass(z.phase)}">${z.phase}</span>
          </div>
          <div class="zombie-meta">
            <span class="label">Model:</span> ${z.model_display || z.model}${z.thinking_mode ? ` · <span style="color:#a78bfa">⚡${z.thinking_mode}</span>` : ' · <span style="color:#666">No Thinking</span>'}
            ${z.last_updated ? ` · <span class="label">Updated:</span> ${z.last_updated}` : ''}<br>
            <span class="label">Action:</span> ${z.action || '—'} · <span class="label">Needs brain:</span> ${z.needs_brain || 'no'}<br>
            <span class="label">Depends on:</span> ${z.depends_on || 'none'} · <span class="label">Commits:</span> ${z.commit_count} · <span class="label">Files:</span> ${z.file_count} (${z.files})
          </div>
          <div class="ctx-bar" title="${(z.total_tokens).toLocaleString()} / ${(z.context_max).toLocaleString()} tokens (${z.context_pct}%)"><div class="ctx-fill ${ctxClass(z.context_pct)}" style="width:${Math.min(z.context_pct, 100)}%"></div></div>
          <div class="zombie-meta">
            <span class="label">Tokens:</span> ${((z.input_tokens + (z.cache_write || 0) + (z.cache_read || 0) + z.output_tokens)/1000).toFixed(1)}k
            (In: ${((z.input_tokens + (z.cache_write || 0) + (z.cache_read || 0))/1000).toFixed(1)}k Out: ${(z.output_tokens/1000).toFixed(1)}k)
            · <span class="label">Cost:</span> $${z.estimated_cost.toFixed(2)}
          </div>
          <div class="zombie-summary">${z.summary}</div>
          ${z.next_step ? `<div class="zombie-meta"><span class="label">Next:</span> ${z.next_step}</div>` : ''}
          ${z.blocker && z.blocker !== 'none' ? `<div class="zombie-meta"><span class="label">Blocker:</span> ${z.blocker}</div>` : ''}
          ${z.memory_excerpt ? `<div class="zombie-message">Memory: ${z.memory_excerpt}</div>` : ''}
        </div>
      `;
    }
  }
  document.getElementById('zombie-grid').innerHTML = html;

  // Cost bar removed — integrated into project bar above

  // Messages (from → to flow)
  let logHtml = '';
  for (const m of data.messages) {
    const typeClass = m.type === 'commit' ? 'commit' : m.type === 'feedback' ? 'feedback' : '';
    const arrow = m.to ? ` → ${m.to}` : '';
    logHtml += `<div class="log-entry">
      <span class="log-time">${m.time}</span>
      <span class="log-source ${sourceClass(m.from || '')}">${m.from || ''}${arrow}</span>
      <span class="log-msg ${typeClass}">${m.message}</span>
    </div>`;
  }
  document.getElementById('log-entries').innerHTML = logHtml;
  // Auto-scroll to bottom
  const logPanel = document.getElementById('log-panel');
  logPanel.scrollTop = logPanel.scrollHeight;
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    render(data);
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
